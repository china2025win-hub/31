<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>移工雇主風險挑戰賽 - 21世紀全球外勞集團</title>
    <meta name="description" content="勞工局明天若按電鈴，你會老神在在還是心跳漏拍？花1分鐘，5道題測測你的風險指數。">

    <meta property="og:title" content="移工雇主風險挑戰賽：你的保險觀念及格嗎？">
    <meta property="og:description" content="別讓一張保單成為勞資未爆彈！立即檢測你的雇主風險係數，避免隱形罰單。">
    <meta property="og:image" content="og-image.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="21世紀全球外勞集團">

    <style>
        :root {
            --primary: #0056b3;
            --secondary: #eef2f7;
            --correct: #28a745;
            --wrong: #dc3545;
            --text: #333;
        }

        body {
            font-family: '微軟正黑體', 'Microsoft JhengHei', sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background: white;
            width: 100%;
            max-width: 480px; /* 稍微縮窄以適應圖片 */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            min-height: 650px;
            display: flex;
            flex-direction: column;
        }

        /* 頂部導航 */
        .header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.3);
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .progress-fill {
            height: 100%;
            background: #ffc107;
            width: 0%;
            transition: width 0.3s;
        }

        /* 內容區塊 */
        .content {
            padding: 30px 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        h2 { margin-bottom: 15px; color: var(--primary); font-size: 1.6rem; }
        p { font-size: 1.05rem; line-height: 1.6; margin-bottom: 30px; color: #555; }

        /* 按鈕樣式 */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }

        .btn:hover { transform: translateY(-2px); background: #004494; }
        
        .btn-option {
            background: white;
            color: var(--text);
            border: 2px solid #e0e0e0;
            text-align: left;
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
            padding: 15px 20px;
            transition: all 0.2s;
        }
        
        .btn-option:hover { border-color: var(--primary); background: var(--secondary); }

        /* 回饋彈窗 (Modal) */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            z-index: 10;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .feedback-overlay.active { opacity: 1; pointer-events: all; }
        .feedback-icon { font-size: 50px; margin-bottom: 15px; }
        .feedback-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .feedback-text { color: #666; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.5; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box;}

        /* 結果頁特別樣式 */
        .result-image-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #fff;
            box-shadow: 0 0 0 5px var(--secondary);
        }
        
        .result-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .score-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <span>移工雇主風險挑戰賽</span>
        <span id="score-display">得分: 0</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="screen-start" class="content fade-in">
        <h2>移工雇主<br>風險管理挑戰</h2>
        <div style="font-size:70px; margin-bottom:20px;">🛡️</div>
        <p>勞工局明天若要來檢查，<br>你有把握全身而退嗎？<br>5 道題，測出你的風險指數。</p>
        <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="screen-game" class="content hidden">
        <h3 id="q-number" style="color:#999; margin:0; font-size:0.9rem;">Q1/5</h3>
        <h2 id="q-text" style="font-size:1.25rem; min-height:70px; display:flex; align-items:center; justify-content:center; margin-bottom:25px;">題目載入中...</h2>
        <div id="options-area"></div>
    </div>

    <div id="feedback-modal" class="feedback-overlay">
        <div id="fb-icon" class="feedback-icon">✅</div>
        <div id="fb-title" class="feedback-title">答對了！</div>
        <div id="fb-desc" class="feedback-text">解釋文字...</div>
        <button class="btn" onclick="nextQuestion()">下一題 ➔</button>
    </div>

    <div id="screen-result" class="content hidden">
        <div id="result-score-tag" class="score-tag" style="background:#ccc;">得分: 0</div>
        <div class="result-image-container">
            <img id="result-img" src="" alt="Result Image" class="result-image">
        </div>
        <h2 id="result-title" style="margin-bottom:10px;">分析結果</h2>
        <p id="result-desc" style="font-size:0.95rem; background:#f8f9fa; padding:15px; border-radius:10px; margin-bottom:25px;">結果說明...</p>
        
        <a href="https://www.21manpower.com.tw/" target="_blank" class="btn">
            預約免費法規健檢
        </a>
        <button onclick="restartGame()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer; text-decoration:underline; font-size:0.9rem;">再玩一次</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "新聘家庭看護，關於「勞保」你的認知是？",
            options: [
                { t: "A. 當然要保，有請人就要保", s: 3, correct: false },
                { t: "B. 家庭看護屬自願加保，可不保", s: 5, correct: true },
                { t: "C. 叫移工簽切結書放棄", s: 0, correct: false }
            ],
            explanation: "家庭看護不強制投保「勞保」，但必須投保「健保」與「職災險」。切結書放棄勞保在法律上是無效的。"
        },
        {
            q: "移工剛拿到居留證，要辦「健保」。你打算？",
            options: [
                { t: "A. 核發後 3 天內乖乖辦理", s: 5, correct: true },
                { t: "B. 生病了再保", s: 0, correct: false },
                { t: "C. 扣移工薪水付全額", s: 0, correct: false }
            ],
            explanation: "健保是強制的！雇主需負擔 60% 保費。若未投保，最高可處保費 2 倍罰鍰。"
        },
        {
            q: "既然不用強制勞保，那「職災險」呢？",
            options: [
                { t: "A. 應該也是選配吧？省下來", s: 0, correct: false },
                { t: "B. 111年新規，這是強制要保的", s: 5, correct: true },
                { t: "C. 有保意外險就好", s: 1, correct: false }
            ],
            explanation: "自 111/5/1 起，外籍家庭看護工已納入職災保險「強制投保」對象，費用低廉但必須由雇主全額負擔。"
        },
        {
            q: "移工休假出去玩摔傷，職災險賠嗎？",
            options: [
                { t: "A. 有保職災就會賠", s: 1, correct: false },
                { t: "B. 不賠，職災只賠工作期間", s: 5, correct: true },
                { t: "C. 移工自己付，跟我無關", s: 0, correct: false }
            ],
            explanation: "職災險僅保障「工作中」。休假意外需靠「商業意外險」來填補，否則龐大醫藥費常導致勞資糾紛。"
        },
        {
            q: "為了省麻煩，保費全部從移工薪水扣？",
            options: [
                { t: "A. 當然不行，要依法分擔", s: 5, correct: true },
                { t: "B. 跟他說好就可以", s: 0, correct: false },
                { t: "C. 給現金叫他自己繳", s: 1, correct: false }
            ],
            explanation: "這屬於違法扣薪！最高可罰 30 萬元並廢止聘僱許可。務必依健保局規定比例計算。"
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function startGame() {
        score = 0;
        currentIdx = 0;
        document.getElementById('score-display').innerText = "得分: 0";
        switchScreen('screen-game');
        loadQuestion();
    }

    function switchScreen(id) {
        document.querySelectorAll('.content').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById(id).classList.add('fade-in');
    }

    function loadQuestion() {
        let q = questions[currentIdx];
        document.getElementById('q-number').innerText = `Q${currentIdx + 1}/${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        let html = '';
        q.options.forEach((opt, index) => {
            html += `<button class="btn btn-option" onclick="handleAnswer(${index})">${opt.t}</button>`;
        });
        document.getElementById('options-area').innerHTML = html;
        document.getElementById('progress-fill').style.width = ((currentIdx) / questions.length * 100) + "%";
    }

    function handleAnswer(optIndex) {
        let q = questions[currentIdx];
        let choice = q.options[optIndex];
        
        score += choice.s;
        document.getElementById('score-display').innerText = `得分: ${score}`;

        let modal = document.getElementById('feedback-modal');
        let icon = document.getElementById('fb-icon');
        let title = document.getElementById('fb-title');
        let desc = document.getElementById('fb-desc');

        if(choice.correct) {
            icon.innerText = "✅";
            title.innerText = "答對了！";
            title.style.color = "var(--correct)";
            desc.innerHTML = `<strong>觀念正確：</strong><br>${q.explanation}`;
        } else if (choice.s > 0) {
            icon.innerText = "⚠️";
            title.innerText = "觀念還行，但...";
            title.style.color = "#ffc107";
            desc.innerHTML = `<strong>專家解析：</strong><br>${q.explanation}`;
        } else {
            icon.innerText = "❌";
            title.innerText = "危險！";
            title.style.color = "var(--wrong)";
            desc.innerHTML = `<strong>小心違法：</strong><br>${q.explanation}`;
        }

        modal.classList.add('active');
    }

    function nextQuestion() {
        document.getElementById('feedback-modal').classList.remove('active');
        currentIdx++;
        if(currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        switchScreen('screen-result');
        document.getElementById('progress-fill').style.width = "100%";
        
        let title = document.getElementById('result-title');
        let desc = document.getElementById('result-desc');
        let img = document.getElementById('result-img');
        let scoreTag = document.getElementById('result-score-tag');

        scoreTag.innerText = `總得分: ${score}`;

        if(score >= 20) {
            // 專業雇主級 (對應 image_14.png)
            title.innerText = "🛡️ 專業雇主級";
            title.style.color = "var(--correct)";
            img.src = "professional.png"; // 圖片檔名
            scoreTag.style.backgroundColor = "var(--correct)";
            desc.innerText = "太強了！您的法規觀念非常清晰，完全是模範雇主。保持下去，或諮詢我們了解更進階的保障。";
        } else if (score >= 13) {
            // 風險觀察區 (對應 image_13.png)
            title.innerText = "⚠️ 風險觀察區";
            title.style.color = "#ffc107";
            img.src = "warning.png"; // 圖片檔名
            scoreTag.style.backgroundColor = "#ffc107";
            scoreTag.style.color = "#333";
            desc.innerText = "您有基本概念，但對於「職災」與「意外」的細節容易搞混。小心這些小盲點成為未來的罰單隱憂。";
        } else {
            // 危險警報區 (對應 image_12.png)
            title.innerText = "🚨 危險警報區";
            title.style.color = "var(--wrong)";
            img.src = "danger.png"; // 圖片檔名
            scoreTag.style.backgroundColor = "var(--wrong)";
            desc.innerText = "注意！您的觀念可能已經觸法。家庭看護雖不強制勞保，但健保與職災險不可少。建議立即諮詢專業協助！";
        }
    }

    function restartGame() {
        startGame();
    }
</script>

</body>
</html>
